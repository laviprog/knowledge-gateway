info:
  name: Update an LLM model
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{API_BASE_URL}}/llm-models/{{LLM_MODEL_ID}}"
  body:
    type: json
    data: |-
      {
        "provider": "openai"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
