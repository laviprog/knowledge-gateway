info:
  name: Create an LLM model
  type: http
  seq: 4

http:
  method: POST
  url: "{{API_BASE_URL}}/llm-models"
  body:
    type: json
    data: |-
      {
        "public_id": "assistant_lite",
        "provider": "openai",
        "provider_model": "gemma4:e4b",
        "context_window_tokens": 128000,
        "max_completion_tokens": 8192
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
