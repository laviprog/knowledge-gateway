server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy same-origin API calls to the backend `api` service on the shared Docker network.
    location /api/ {
        # Resolve `api` via Docker's embedded DNS at request time, so this container can start
        # (and survive api restarts) independently of the api container's lifecycle.
        resolver 127.0.0.11 valid=30s;
        set $api_upstream api:8080;
        proxy_pass http://$api_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Chat-completion responses can stream (SSE) — don't buffer, and allow long reads.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Hashed build assets never change — cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every path serves index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
