name: Admin

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: admin-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: admin

jobs:
  admin:
    name: Biome + tsc + vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check (Biome)
        run: npm run lint

      - name: Type check
        run: npx tsc -b

      - name: Run tests
        run: npm run test

      - name: Build
        run: npx vite build
