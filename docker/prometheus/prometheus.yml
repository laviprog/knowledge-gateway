global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: knowledge-gateway
    metrics_path: /metrics
    static_configs:
      - targets: [ "api:8080" ]
        labels:
          service: api

  - job_name: prometheus
    static_configs:
      - targets: [ "localhost:9090" ]
